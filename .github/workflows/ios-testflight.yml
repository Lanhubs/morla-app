name: iOS TestFlight Build

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  FLUTTER_VERSION: "3.32.2"

jobs:
  build-ios:
    name: Build & Deploy to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      # ───────────────────────────────────────────────
      # 1. Checkout source code
      # ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────
      # 2. Install Flutter
      # ───────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ───────────────────────────────────────────────
      # 3. Install dependencies
      # ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ───────────────────────────────────────────────
      # 4. Install the Apple certificate & provisioning profile
      # ───────────────────────────────────────────────
      - name: Install Apple Certificate & Provisioning Profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate & profile from base64
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate into keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # ───────────────────────────────────────────────
      # 5. Build the iOS IPA (release)
      # ───────────────────────────────────────────────
      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      # ───────────────────────────────────────────────
      # 6. Upload IPA as GitHub Artifact (backup download)
      # ───────────────────────────────────────────────
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: morla-ios-${{ github.sha }}
          path: build/ios/ipa/*.ipa

      # ───────────────────────────────────────────────
      # 7. Upload to TestFlight via App Store Connect API
      # ───────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Install the App Store Connect API key for xcrun
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ───────────────────────────────────────────────
      # 8. Cleanup keychain
      # ───────────────────────────────────────────────
      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
