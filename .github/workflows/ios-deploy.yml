name: iOS Build and Deploy

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight
          - app-store

env:
  FLUTTER_VERSION: '3.24.0'
  XCODE_VERSION: '15.4'

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ env.FLUTTER_VERSION }}'

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generation (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: Analyze Code
        run: flutter analyze --fatal-infos

      - name: Run Tests
        run: flutter test --coverage || echo "No tests found"

      # Setup Xcode and signing
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Setup SSH for Private Dependencies (if needed)
        uses: webfactory/ssh-agent@v0.9.0
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Configure Apple Certificates and Provisioning Profiles
      - name: Import Apple Code Signing Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}

      - name: Download Provisioning Profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH/BillKit.mobileprovision"

      - name: Setup Build Configuration
        run: |
          # Set build number based on run number
          BUILD_NUMBER=${{ github.run_number }}
          
          # Extract version from pubspec.yaml
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          
          echo "Building version $VERSION ($BUILD_NUMBER)"
          
          # Update Info.plist with version and build number
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist

      - name: Create Environment Config
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cat > lib/core/config/env.dart << EOF
          class Environment {
            static const String apiBaseUrl = '$API_BASE_URL';
            static const String sentryDsn = '$SENTRY_DSN';
            static const bool isProduction = true;
          }
          EOF

      - name: Build iOS App (Release)
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload dSYM for Crash Reporting
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsym-${{ github.run_number }}
          path: build/ios/archive/Runner.xcarchive/dSYMs/
          retention-days: 90

  deploy-testflight:
    name: Deploy to TestFlight
    needs: build-ios
    runs-on: macos-14
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'testflight'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ./build/ios/ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Notify TestFlight Upload Success
        if: success()
        run: |
          echo "✅ Successfully uploaded to TestFlight"
          echo "Build Number: ${{ github.run_number }}"
          echo "Version: $(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)"

  deploy-app-store:
    name: Deploy to App Store
    needs: build-ios
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'app-store'
    environment: production
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ./build/ios/ipa

      - name: Validate App Store Submission
        run: |
          xcrun altool --validate-app \
            --file build/ios/ipa/*.ipa \
            --type ios \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      - name: Upload to App Store
        run: |
          xcrun altool --upload-app \
            --file build/ios/ipa/*.ipa \
            --type ios \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/ipa/*.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Notifications
    needs: [build-ios, deploy-testflight]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Notify Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            iOS Build ${{ github.run_number }} - ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
